[tools]
go = "1.26"
golangci-lint = "2.11.4"
goreleaser = "latest"

[env]
MMDOT_LOG_LEVEL = "debug"

[tasks.run]
description = "Run the main application"
run = "go run *.go --config='./mmdot.yml'"

[tasks.build]
description = "Build the binary with goreleaser"
run = "goreleaser build --snapshot --clean"

[tasks.test]
description = "Run all go tests"
run = "go test ./..."

[tasks.coverage]
description = "Run tests with race detection and coverage"
run = "go test -race -coverprofile=coverage.out -covermode=atomic ./... -v -cover"

[tasks.tidy]
description = "Run go mod tidy"
run = "go mod tidy"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Run golangci-lint fmt"
run = "golangci-lint fmt"

[tasks.pr]
description = "Run all checks for PRs (tidy, lint, test)"
run = [
    { task = "tidy" },
    { task = "lint" },
    { task = "test" },
]

[tasks.release]
description = "Creates a new release (only works on main branch)"
run = "./release.sh"
