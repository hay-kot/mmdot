name: Build and Publish

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      semverbump:
        description: "Which version to bump by"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  tests:
    name: "Go Build/Test"
    uses: ./.github/workflows/partial-tests.yml

  tag:
    name: "Publish Tag"
    runs-on: ubuntu-latest
    needs:
      - tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Fetch all tags"
        run: git fetch --force --tags

      - name: "Get latest tag"
        id: get-latest-tag
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - uses: actions-ecosystem/action-bump-semver@v1
        id: bump-semver
        with:
          current_version: ${{ steps.get-latest-tag.outputs.tag }}
          level: ${{ inputs.semverbump }}

      - name: "Push tag"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "${{ steps.bump-semver.outputs.new_version }}" -m "${{ steps.bump-semver.outputs.new_version }}"
          git push origin "${{ steps.bump-semver.outputs.new_version }}"

  goreleaser:
    name: "Release"
    needs:
      - tests
      - tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: git fetch --force --tags
      - name: "Get latest tag"
        id: get-tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
      - name: "Checkout tag"
        run: git checkout ${{ steps.get-tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
